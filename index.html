<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeFlow</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #FBFBFD;
            --red: rgba(255, 180, 190, 0.8);
            --green: rgba(180, 210, 185, 0.8);
            --blue: rgba(175, 195, 220, 0.8);
            --text: #3A3A3C;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* V4 经典动画 */
        @keyframes floatV4 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5px, -10px) scale(1.02); }
            66% { transform: translate(-5px, -5px) scale(0.98); }
        }

        #home-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .portal-layout { display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .row-top { display: flex; gap: 30px; }

        .bubble {
            width: 140px; height: 140px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 700; font-size: 19px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;
            cursor: pointer; active { transform: scale(0.95); transition: 0.1s; }
        }

        .bubble-red { background: var(--red); animation: floatV4 7s infinite ease-in-out; }
        .bubble-green { background: var(--green); animation: floatV4 8s infinite ease-in-out -1.5s; }
        .bubble-blue { background: var(--blue); animation: floatV4 9s infinite ease-in-out -3s; }

        /* 页面层级提升 */
        .page { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background:var(--bg); z-index:999; 
            display:none; flex-direction:column; 
            padding: calc(85px + env(safe-area-inset-top)) 20px 40px; 
            overflow-y:auto; 
        }
        .page.active { display:flex; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-back { position:fixed; top:calc(20px + env(safe-area-inset-top)); left:20px; color:#007AFF; border:none; background:none; font-size:18px; z-index:1000; font-weight:600; padding: 10px; }
        
        .card { background:white; border-radius:24px; padding:20px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.03); position: relative; }
        .btn-action { width:100%; padding:16px; border-radius:16px; border:none; font-size:16px; font-weight:700; margin-top:12px; color: #333; }
        .btn-del { position: absolute; top: 15px; right: 15px; color: #FF3B30; opacity: 0.4; border:none; background:none; font-size:13px; }
        
        h1 { font-size: 32px; font-weight: 800; margin: 0 0 20px; }
        .sub-data { font-size: 11px; opacity: 0.8; margin-top: 6px; font-weight: 400; }
    </style>
</head>
<body>

<div id="home-screen">
    <div class="portal-layout">
        <div class="row-top">
            <div class="bubble bubble-red" onclick="openPage('red')">消耗区<span id="h-red" class="sub-data">¥ 0.00</span></div>
            <div class="bubble bubble-green" onclick="openPage('green')">养成区<span id="h-green" class="sub-data">0%</span></div>
        </div>
        <div class="bubble bubble-blue" onclick="openPage('blue')">复盘区<span class="sub-data">账单明细</span></div>
    </div>
</div>

<div id="page-red" class="page">
    <button class="btn-back" onclick="closePage('red')">← 返回</button>
    <h1>消耗记录</h1>
    <div id="red-list"></div>
    <button onclick="addItem('red')" style="width:100%;padding:16px;border:2px dashed #ccc;background:none;border-radius:16px;color:#888;font-weight:600;margin-bottom:60px;">+ 新增项目</button>
</div>

<div id="page-green" class="page">
    <button class="btn-back" onclick="closePage('green')">← 返回</button>
    <h1>成长目标</h1>
    <div id="green-list"></div>
    <button onclick="addItem('green')" style="width:100%;padding:16px;border:2px dashed #ccc;background:none;border-radius:16px;color:#888;font-weight:600;margin-bottom:60px;">+ 新增项目</button>
</div>

<div id="page-blue" class="page">
    <button class="btn-back" onclick="closePage('blue')">← 返回</button>
    <h1>本月总结</h1>
    <div id="insight-content"></div>
</div>

        try {
            const saved = localStorage.getItem('lifeflow_v7_3');

                state = JSON.parse(saved);
