<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeFlow V5</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* 样式保持 V4 的高级感，并针对输入框做了优化 */
        :root {
            --bg: #FBFBFD;
            --red-zone: rgba(255, 180, 190, 0.75);
            --green-zone: rgba(180, 210, 185, 0.75);
            --blue-zone: rgba(175, 195, 220, 0.75);
            --text-main: #3A3A3C;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* 主页倒三角布局 */
        #home-screen { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .portal-layout { display: flex; flex-direction: column; align-items: center; gap: 6vh; }
        .row-top { display: flex; gap: 10vw; }
        .bubble { width: 40vw; height: 40vw; max-width: 160px; max-height: 160px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 600; box-shadow: 0 15px 35px rgba(0,0,0,0.05); transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); text-align: center; }
        .bubble span { font-size: 11px; opacity: 0.6; margin-top: 5px; font-weight: 400; }
        .bubble-red { background: var(--red-zone); }
        .bubble-green { background: var(--green-zone); }
        .bubble-blue { background: var(--blue-zone); }

        /* 二级页面 */
        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding: calc(80px + env(safe-area-inset-top)) 20px 40px; overflow-y: auto; }
        .page.active { display: flex; }
        .btn-back { position: fixed; top: calc(25px + env(safe-area-inset-top)); left: 20px; font-size: 17px; background: none; border: none; color: #007AFF; z-index: 110; }
        
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .item-title { font-size: 18px; font-weight: 700; display: flex; justify-content: space-between; }
        .item-money { font-size: 14px; color: #FF9500; margin-top: 5px; }
        
        .btn-action { width: 100%; padding: 15px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; margin-top: 15px; }
        .btn-red { background: var(--red-zone); }
        .btn-green { background: var(--green-zone); }
        .btn-add { width: 100%; padding: 15px; border: 2px dashed #DDD; border-radius: 14px; background: none; color: #999; font-weight: 600; margin-top: 10px; }
        
        /* 简报卡片 */
        .report-card { background: linear-gradient(135deg, #fff 0%, #f4f7f6 100%); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.03); }
    </style>
</head>
<body>

<div id="home-screen">
    <div class="portal-layout">
        <div class="row-top">
            <div class="bubble bubble-red" onclick="openPage('red')">消耗区<span id="red-sub">0.00 元</span></div>
            <div class="bubble bubble-green" onclick="openPage('green')">养成区<span id="green-sub">0% 进度</span></div>
        </div>
        <div class="bubble bubble-blue" onclick="openPage('blue')">复盘区<span>数据/档案</span></div>
    </div>
</div>

<div id="page-red" class="page">
    <button class="btn-back" onclick="closePage('red')">完成</button>
    <h1 style="margin-top:0">消耗记录</h1>
    <div id="red-list"></div>
    <button class="btn-add" onclick="addItem('red')">+ 新增限额项目</button>
</div>

<div id="page-green" class="page">
    <button class="btn-back" onclick="closePage('green')">完成</button>
    <h1 style="margin-top:0">目标挑战</h1>
    <div id="green-list"></div>
    <button class="btn-add" onclick="addItem('green')">+ 新增养成项目</button>
</div>

<div id="page-blue" class="page">
    <button class="btn-back" onclick="closePage('blue')">完成</button>
    <h1 style="margin-top:0">本月简报</h1>
    <div id="insight-area"></div>
    <div class="card">
        <h3>🕰️ 往期历史</h3>
        <div id="history-archive" style="font-size:14px; color:#666;">暂无历史归档</div>
    </div>
</div>

<script>
    let state = {
        red: [], // {id, name, limit, used, totalCost}
        green: [], // {id, name, goal, done}
        history: [], // 存储往月简报
        lastUpdateMonth: new Date().getMonth()
    };

    function init() {
        const saved = localStorage.getItem('lifeflow_v5');
        if (saved) {
            let parsed = JSON.parse(saved);
            const currentMonth = new Date().getMonth();
            
            // --- 核心：跨月自动刷新逻辑 ---
            if (parsed.lastUpdateMonth !== currentMonth) {
                archiveMonth(parsed); // 归档
                // 重置本月数据，但保留项目结构
                state.red = parsed.red.map(i => ({...i, used: 0, totalCost: 0}));
                state.green = parsed.green.map(i => ({...i, done: 0}));
                state.history = parsed.history || [];
                state.lastUpdateMonth = currentMonth;
            } else {
                state = parsed;
            }
        } else {
            // 初始示例
            state.red = [{id: 1, name: '奶茶/咖啡', limit: 8, used: 0, totalCost: 0}];
            state.green = [{id: 2, name: '运动打卡', goal: 20, done: 0}];
        }
        refreshUI();
    }

    // 归档函数
    function archiveMonth(oldData) {
        const monthNames = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
        const record = {
            title: monthNames[oldData.lastUpdateMonth] + "总结",
            cost: oldData.red.reduce((sum, i) => sum + (i.totalCost || 0), 0).toFixed(2),
            achieve: oldData.green.length ? Math.round(oldData.green.reduce((sum, i) => sum + (i.done/i.goal), 0) / oldData.green.length * 100) : 0
        };
        state.history = oldData.history || [];
        state.history.unshift(record);
    }

    function save() { localStorage.setItem('lifeflow_v5', JSON.stringify(state)); }

    function openPage(id) { 
        if(id === 'blue') generateInsight();
        document.getElementById('page-'+id).classList.add('active'); 
    }
    function closePage(id) { document.getElementById('page-'+id).classList.remove('active'); refreshUI(); }

    function addItem(type) {
        const name = prompt("项目名称 (如: 外卖)"); if(!name) return;
        const num = prompt("每月次数 (如: 10)", "10"); if(!num) return;
        const newItem = { id: Date.now(), name, limit: parseInt(num), goal: parseInt(num), used: 0, done: 0, totalCost: 0 };
        state[type].push(newItem);
        save(); refreshUI();
    }

    function doAction(type, id) {
        const item = state[type].find(i => i.id === id);
        if (type === 'red') {
            if (item.used >= item.limit) return alert("额度已用尽！");
            const price = prompt(`记录一笔「${item.name}」，花了多少钱？`, "0");
            if (price === null) return;
            item.used++;
            item.totalCost += parseFloat(price || 0);
        } else {
            item.done++;
        }
        save(); refreshUI();
    }

    function generateInsight() {
        const totalSpend = state.red.reduce((sum, i) => sum + (i.totalCost || 0), 0);
        const area = document.getElementById('insight-area');
        area.innerHTML = `
            <div class="report-card">
                <div style="font-size:14px; color:#888">本月总消费</div>
                <div style="font-size:32px; font-weight:800; color:#FF3B30">¥ ${totalSpend.toFixed(2)}</div>
                <div style="margin-top:15px; font-size:14px;">
                    ${state.red.map(i => `<div>· ${i.name}: 耗 ${i.used} 次, 支出 ¥${i.totalCost.toFixed(2)}</div>`).join('')}
                </div>
            </div>
        `;
        const historyArea = document.getElementById('history-archive');
        if (state.history.length) {
            historyArea.innerHTML = state.history.map(h => `<div style="margin-bottom:8px;"><b>${h.title}</b>: 消费 ¥${h.cost}, 达成率 ${h.achieve}%</div>`).join('');
        }
    }

    function refreshUI() {
        // 渲染消耗区列表
        document.getElementById('red-list').innerHTML = state.red.map(i => `
            <div class="card">
                <div class="item-title"><span>${i.name}</span> <span style="color:#999">${i.used}/${i.limit}</span></div>
                <div class="item-money">已累计: ¥${(i.totalCost || 0).toFixed(2)}</div>
                <button class="btn-action btn-red" onclick="doAction('red', ${i.id})">记录一次支出</button>
            </div>
        `).join('');

        // 渲染养成区列表
        document.getElementById('green-list').innerHTML = state.green.map(i => `
            <div class="card">
                <div class="item-title"><span>${i.name}</span> <span style="color:#999">${i.done}/${i.goal}</span></div>
                <div style="height:6px; background:#EEE; border-radius:3px; margin-top:10px; overflow:hidden">
                    <div style="width:${(i.done/i.goal)*100}%; height:100%; background:var(--green-zone)"></div>
                </div>
                <button class="btn-action btn-green" onclick="doAction('green', ${i.id})">完成一次打卡</button>
            </div>
        `).join('');

        // 更新主页小文字
        const totalS = state.red.reduce((sum, i) => sum + (i.totalCost || 0), 0);
        document.getElementById('red-sub').innerText = `已花 ¥${totalS.toFixed(2)}`;
    }

    init();
</script>
</body>
</html>
